name = "freelance-domination-engine"
main = "src/index.js"
compatibility_date = "2026-06-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "fde-db"
database_id = "63c21217-6bd7-4be9-8998-ab96f937f141"

# KV Namespace for config & cache
[[kv_namespaces]]
binding = "CACHE"
id = "0232c09c7d1f4a738b4c00dfa2554e8c"

# Cron trigger - every 3 minutes
[triggers]
crons = ["*/3 * * * *"]

# Environment variables (secrets set via wrangler secret)
[vars]
MIN_BUDGET = "300"

workers_dev = true
